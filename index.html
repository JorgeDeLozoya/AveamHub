<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVEAM | Official Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fff;
            color: #000;
            overflow-x: hidden;
        }

        .header-store {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
        }

        .logo-store {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            gap: 3rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: #000;
        }

        .hero-section {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f4f4f4;
            margin: 1rem;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mix-blend-mode: multiply;
            opacity: 0.9;
        }

        .hero-content {
            position: absolute;
            bottom: 10%;
            left: 5%;
        }

        .hero-content h1 {
            font-size: 6rem;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 2rem;
        }

        .btn-black {
            background: #000;
            color: #fff;
            padding: 1rem 3rem;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            display: inline-block;
        }

        .grid-store {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1rem;
        }

        .product-item {
            background: #f9f9f9;
            padding: 4rem;
            text-align: center;
            position: relative;
            transition: background 0.3s ease;
        }

        .product-item:hover {
            background: #f0f0f0;
        }

        .product-label {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #000;
            padding: 0.2rem 0.5rem;
        }

        .product-name {
            margin-top: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .product-price {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }

        footer {
            padding: 4rem;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .hub-access {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #000;
            color: #fff;
            padding: 0.5rem 1rem;
            font-size: 0.6rem;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 0.1rem;
        }
    </style>
</head>
<body>
    <header class="header-store">
        <div class="logo-store">AVEAM</div>
        <nav class="nav-menu">
            <a href="#">Shop All</a>
            <a href="#">Drops</a>
            <a href="#">About</a>
            <a href="#">Cart (0)</a>
        </nav>
    </header>

    <section class="hero-section">
        <img src="aveam_hero_hoodie_1777651086148.png" alt="AVEAM Hero" class="hero-image">
        <div class="hero-content">
            <p style="text-transform: uppercase; font-weight: 900; letter-spacing: 0.3rem; margin-bottom: 1rem;">Spring Summer 2026</p>
            <h1>OBJECTS OF<br>DESIRE</h1>
            <a href="#" class="btn-black">Shop Collection</a>
        </div>
    </section>

    <section class="grid-store">
        <div class="product-item">
            <span class="product-label">New Arrival</span>
            <div style="height: 400px; display: grid; place-items: center; color: #ccc; font-weight: 900; font-size: 3rem;">IMAGE</div>
            <div class="product-name">Silk Thread Hoodie</div>
            <div class="product-price">120.00 EUR</div>
        </div>
        <div class="product-item">
            <span class="product-label">Limited</span>
            <div style="height: 400px; display: grid; place-items: center; color: #ccc; font-weight: 900; font-size: 3rem;">IMAGE</div>
            <div class="product-name">Brutal Cap Black</div>
            <div class="product-price">45.00 EUR</div>
        </div>
    </section>

    <a href="hub.html" class="hub-access">ADMIN HUB</a>

    <footer>
        AVEAM CLOTHING © 2026. PRODUCED IN SPAIN.
    </footer>
</body>
</html>
