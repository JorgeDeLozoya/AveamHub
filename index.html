<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVEAM | Official Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fff;
            color: #000;
            display: block; /* Overriding possible flex from style.css */
        }

        .header-store {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
        }

        .logo-store {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            gap: 2.5rem;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: #000;
        }

        .hero-section {
            height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f4f4f4;
            margin: 1rem;
            overflow: hidden;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        .hero-content p {
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.4rem;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.85;
            margin-bottom: 3rem;
        }

        .btn-black {
            background: #000;
            color: #fff;
            padding: 1.2rem 3.5rem;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: inline-block;
            letter-spacing: 0.1rem;
            transition: all 0.3s ease;
        }

        .btn-black:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .grid-store {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .product-item {
            background: #f9f9f9;
            padding: 6rem 2rem;
            text-align: center;
            position: relative;
            transition: background 0.3s ease;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-item:hover {
            background: #f0f0f0;
        }

        .product-label {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #000;
            padding: 0.3rem 0.6rem;
        }

        .product-name {
            margin-top: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.4rem;
            letter-spacing: 0.05rem;
        }

        .product-price {
            font-size: 0.85rem;
            color: #555;
            margin-top: 0.8rem;
            font-weight: 500;
        }

        footer {
            padding: 6rem 2rem;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            color: #888;
        }

        .hub-access {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #000;
            color: #fff;
            padding: 0.8rem 1.2rem;
            font-size: 0.6rem;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 0.15rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header class="header-store">
        <div class="logo-store">AVEAM</div>
        <nav class="nav-menu">
            <a href="#">Shop All</a>
            <a href="#">Drops</a>
            <a href="#">About</a>
            <a href="#">Cart (0)</a>
        </nav>
    </header>

    <section class="hero-section">
        <img src="aveam_hero_hoodie_1777651086148.png" alt="AVEAM Hero" class="hero-image">
        <div class="hero-content">
            <p>Spring Summer 2026</p>
            <h1>OBJECTS OF<br>DESIRE</h1>
            <a href="#" class="btn-black">Discover Collection</a>
        </div>
    </section>

    <section class="grid-store">
        <div class="product-item">
            <span class="product-label">New Arrival</span>
            <div style="font-weight: 900; font-size: 4rem; color: #eee;">01</div>
            <div class="product-name">Silk Thread Hoodie</div>
            <div class="product-price">120.00 EUR</div>
        </div>
        <div class="product-item">
            <span class="product-label">Limited Edition</span>
            <div style="font-weight: 900; font-size: 4rem; color: #eee;">02</div>
            <div class="product-name">Brutal Cap Black</div>
            <div class="product-price">45.00 EUR</div>
        </div>
    </section>

    <a href="hub.html" class="hub-access">ADMIN HUB</a>

    <footer>
        AVEAM CLOTHING © 2026. PRODUCED IN SPAIN. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
